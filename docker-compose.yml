services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: littleboatpoll
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '80:8000'
      - '443:8000'
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
