name: Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Check coverage threshold
        run: |
          COVERAGE_FILE="coverage/coverage-summary.json"
          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "Coverage summary file not found: $COVERAGE_FILE"
            exit 1
          fi
          
          node - << 'EOF'
          const fs = require('fs');
          const path = require('path');
          
          const THRESHOLD = 25;
          const coveragePath = path.resolve('coverage/coverage-summary.json');
          
          let data;
          try {
            data = JSON.parse(fs.readFileSync(coveragePath, 'utf8'));
          } catch (err) {
            console.error('Failed to read or parse coverage summary:', err.message);
            process.exit(1);
          }
          
          const lines = data && data.total && data.total.lines;
          const linesPct = lines && typeof lines.pct === 'number' ? lines.pct : null;
          
          if (linesPct === null) {
            console.error('Could not determine line coverage percentage from coverage-summary.json');
            process.exit(1);
          }
          
          if (linesPct < THRESHOLD) {
            console.error(`Coverage is ${linesPct}%, which is below ${THRESHOLD}% threshold`);
            process.exit(1);
          } else {
            console.log(`Coverage is ${linesPct}%, meets threshold of ${THRESHOLD}%`);
          }
          EOF

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false
